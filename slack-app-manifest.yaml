display_information:
  name: Slack Comment Viewer
  description: Overlay Slack channel messages on web pages for webinars and presentations.
  background_color: "#4A154B"
features:
  bot_user:
    display_name: Comment Viewer
    always_online: false
oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - users:read
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
